<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact TheGiggle | Get Your Custom Quote</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Outfit', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .form-card { background: #0a0a0a; border: 1px solid #00f2ff; padding: 50px; border-radius: 30px; width: 100%; max-width: 550px; box-shadow: 0 0 50px rgba(0,242,255,0.1); }
        h1 { color: #00f2ff; text-align: center; font-family: 'Syncopate', sans-serif; font-size: 1.5rem; margin-bottom: 40px; }
        input, select, textarea { width: 100%; padding: 16px; margin-bottom: 20px; background: #111; border: 1px solid #333; color: #fff; border-radius: 12px; }
        button { width: 100%; padding: 18px; background: #00f2ff; color: #000; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="form-card">
        <h1>LET'S BUILD THE FUTURE</h1>
        <form action="https://formspree.io/f/mqkrpvyv" method="POST">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <select name="service">
                <option>SEO Strategy</option>
                <option>3D Web Design</option>
                <option>Social Media Marketing</option>
                <option>E-commerce Growth</option>
            </select>
            <textarea name="message" rows="5" placeholder="Describe your project goals..."></textarea>
            <button type="submit">Send Inquiry</button>
        </form>
    </div>
</body>
</html>
