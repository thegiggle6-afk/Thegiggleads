    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --accent: #ff006e;
            --bg: #000;
            --text: #ffffff;
            --text-muted: #a0a0b0;
            --card-bg: rgba(255,255,255,0.04);
            --card-border: rgba(255,255,255,0.08);
            --glow: 0 0 30px rgba(0,242,255,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            background: linear-gradient(45deg, #000000, #0a0a0a, #001214, #000000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 3D BACKGROUND BOX */
        #bg-box {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; z-index: -2;
            opacity: 0.6;
        }

        /* FLOATING PARTICLES */
        #particles-js {
            position: fixed; width: 100%; height: 100%;
            top: 0; left: 0; z-index: -1;
        }

        nav {
            position: fixed; top: 0; width: 100%;
            padding: 18px 8%;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000;
            background: rgba(0,0,0,0.88);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,242,255,0.15);
            transition: padding 0.3s;
        }

        .logo {
            font-family: 'Syncopate', sans-serif;
            color: var(--primary);
            font-size: 1.3rem;
            letter-spacing: 3px;
            text-shadow: var(--glow);
            text-decoration: none;
        }

        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: var(--primary); }

        .nav-cta {
            padding: 8px 22px;
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary) !important;
            border-radius: 50px;
            font-size: 0.72rem !important;
            transition: all 0.3s !important;
        }
        .nav-cta:hover { background: var(--primary) !important; color: #000 !important; }

        section {
            min-height: 100vh;
            padding: 120px 10% 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .hero { text-align: center; align-items: center; }

        .hero h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(2.2rem, 9vw, 6rem);
            line-height: 1.05;
            margin-bottom: 24px;
        }

        .hero h1 span {
            color: var(--primary);
            text-shadow: 0 0 40px var(--primary), 0 0 80px rgba(0,242,255,0.3);
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-top: 50px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 36px 24px;
            border-radius: 20px;
            text-align: left;
            transition: 0.4s ease;
            backdrop-filter: blur(10px);
            text-decoration: none;
            display: block;
            color: inherit;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 20px 60px rgba(0,242,255,0.15);
        }

        .card-icon {
            width: 52px; height: 52px;
            background: rgba(0,242,255,0.1);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px;
            animation: floatIcon 3s ease-in-out infinite;
        }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .contact-form {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 36px;
            backdrop-filter: blur(15px);
        }

        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.72rem; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 14px; background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 12px;
        }

        footer { padding: 30px 10%; border-top: 1px solid rgba(255,255,255,0.06); text-align: center; }

        @media (max-width: 768px) {
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

    <div id="bg-box">
        <script type="module" src="https://unpkg.com/@splinetool/viewer@1.0.28/build/spline-viewer.js"></script>
        <spline-viewer url="https://prod.spline.design/6Wq1Q7YEBCjYvS66/scene.splinecode"></spline-viewer>
    </div>
    <div id="particles-js"></div>

    <nav id="navbar">
        <a href="#home" class="logo">THEGIGGLE</a>
        <div class="nav-links">
            <a href="#services">Services</a>
            <a href="#contact" class="nav-cta">Get a Quote</a>

    </nav>

    <section id="home" class="hero">
        <div data-aos="fade-up">

            <p style="color: var(--text-muted); max-width: 500px; margin: 20px auto;">Agra's premium agency for 3D Web Design & SEO.</p>
            <a href="#contact" class="btn btn-primary" style="text-decoration: none;">Work With Us</a>
        </div>
    </section>

    <section id="services">
        <h2 style="font-family: 'Syncopate'; margin-bottom: 40px; text-align: center;">OUR <span>SERVICES</span></h2>
        <div class="services-grid">
            <a href="seo-optimization.html" class="card" data-aos="fade-up">

            </a>
            <a href="web-design.html" class="card" data-aos="fade-up" data-aos-delay="100">

                <h3>3D Web Design</h3>

    </section>

    <section id="contact">
        <div class="contact-form" data-aos="fade-up">

            <form action="https://formspree.io/f/xdabegna" method="POST">

                <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
                <div class="form-group"><label>Message</label><textarea name="message" rows="4" required></textarea></div>
                <button type="submit" class="btn btn-primary" style="width:100%; border:none; cursor:pointer;">Send Message</button>
            </form>
        </div>
    </section>

    <footer>
        <p>© 2026 TheGiggle | Digital Marketing, Agra</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });
        
        particlesJS('particles-js', {
            "particles": { "number": { "value": 50 }, "color": { "value": "#ffffff" }, "opacity": { "value": 0.2 }, "size": { "value": 2 }, "line_linked": { "enable": true, "distance": 150, "color": "#ffffff", "opacity": 0.1, "width": 1 }, "move": { "enable": true, "speed": 1 } }
        });
    </script>
</body>
